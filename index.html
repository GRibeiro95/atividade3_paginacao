<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Atividade de Paginação</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Exemplo de Paginação</h1>

<h3>Normal</h3>

<div class="paginacao">
<ul>
<li><a href="#">«</a></li>
<li><a href="#">1</a></li>
<li><a href="#">2</a></li>
<li><a href="#">3</a></li>
<li><a href="#">»</a></li>
</ul>
</div>


<h3>Quando passar o mouse</h3>

<div class="paginacao hover">
<ul>
<li><a href="#">«</a></li>
<li><a href="#">1</a></li>
<li><a href="#">2</a></li>
<li><a href="#">3</a></li>
<li><a href="#">»</a></li>
</ul>
</div>

</body>
</html>
